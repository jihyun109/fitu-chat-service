spring:
  application:
    name: fitu-chat-service

  data:
    mongodb:
      uri: mongodb://mongodb:27017/fitu_chat

    redis:
      host: redis
      port: 6379
      timeout: 2s

jwt:
  secret: ${JWT_SECRET:default-secret-key}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: fitu-chat-service

server:
  port: 8081
