apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fitu-chat-monitor
  namespace: fitu
spec:
  selector: {}
  namespaceSelector:
    matchNames:
      - fitu
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_name]
          regex: chat-service
          action: keep
