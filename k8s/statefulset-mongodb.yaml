apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: fitu
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: fitu-mongodb
  template:
    metadata:
      labels:
        app: fitu-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "0.05"
              memory: 128Mi
            limits:
              cpu: "0.2"
              memory: 256Mi
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
